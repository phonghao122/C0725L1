<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="mb-4">📚 Library</h2>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
    <tr>
        <th>Tên sách</th>
        <th>Tác giả</th>
        <th>Số lượng</th>
        <th>Hành động</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="b : ${books}">
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td>
            <span th:text="${b.quantity}"
                  th:classappend="${b.quantity == 0} ? 'text-danger fw-bold' : ''">
            </span>
        </td>

        <td>
            <a th:href="@{/book/{id}(id=${b.id})}"
               class="btn btn-info btn-sm">Xem</a>

            <a th:href="@{/borrow/{id}(id=${b.id})}"
               class="btn btn-success btn-sm"
               th:classappend="${b.quantity == 0} ? 'disabled' : ''">
                Mượn
            </a>
        </td>
    </tr>
    </tbody>
</table>

<a th:href="@{/return}" class="btn btn-warning">Trả sách</a>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toastMsg" class="toast align-items-center text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" th:text="${message}"></div>
            <button type="button" class="btn-close btn-close-white me-2" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${message}">
    const toast = new bootstrap.Toast(document.getElementById('toastMsg'));
    toast.show();
</script>

</body>
</html>
