<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trả sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>🔄 Trả sách</h2>

<form th:action="@{/return}" method="post" onsubmit="return validateForm()">

    <div class="mb-3">
        <label class="form-label">Mã mượn</label>
        <input type="text" id="code" name="code" class="form-control" placeholder="5 chữ số">
        <small id="error" class="text-danger"></small>
    </div>

    <button class="btn btn-primary">Trả sách</button>
</form>

<br>
<a th:href="@{/books}" class="btn btn-secondary">Quay lại</a>

<script>
    function validateForm() {
        const code = document.getElementById("code").value;
        const error = document.getElementById("error");

        const regex = /^[0-9]{5}$/;

        if (!regex.test(code)) {
            error.innerText = "Mã phải là 5 chữ số!";
            return false;
        }

        error.innerText = "";
        return true;
    }
</script>

</body>
</html>
