<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mượn sách</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                📚 Mượn sách
            </div>

            <div class="card-body">

                <!-- Thông tin sách -->
                <h5 class="card-title" th:text="${book.title}"></h5>

                <p>
                    <b>Tác giả:</b>
                    <span th:text="${book.author}"></span>
                </p>

                <p>
                    <b>Số lượng còn:</b>
                    <span th:text="${book.quantity}"
                          th:classappend="${book.quantity == 0} ? 'text-danger fw-bold' : ''">
                    </span>
                </p>

                <hr>

                <!-- Nếu còn sách -->
                <div th:if="${book.quantity > 0}">

                    <form th:action="@{/borrow}" method="post">
                        <input type="hidden" name="bookId" th:value="${book.id}">

                        <button class="btn btn-success w-100">
                            ✅ Xác nhận mượn
                        </button>
                    </form>

                </div>

                <!-- Nếu hết sách -->
                <div th:if="${book.quantity == 0}">
                    <div class="alert alert-danger text-center">
                        ❌ Sách đã hết, không thể mượn
                    </div>

                    <button class="btn btn-secondary w-100" disabled>
                        Không thể mượn
                    </button>
                </div>

            </div>
        </div>

        <br>
        <a th:href="@{/books}" class="btn btn-outline-secondary">← Quay lại</a>

    </div>
</div>

</body>
</html>
