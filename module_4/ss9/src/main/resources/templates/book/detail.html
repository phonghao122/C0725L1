<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chi tiết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>📖 Chi tiết sách</h2>

<div class="card p-3 mt-3">
    <p><b>Tên:</b> <span th:text="${book.title}"></span></p>
    <p><b>Tác giả:</b> <span th:text="${book.author}"></span></p>
    <p>
        <b>Số lượng:</b>
        <span th:text="${book.quantity}"
              th:classappend="${book.quantity == 0} ? 'text-danger fw-bold' : ''">
        </span>
    </p>

    <a th:href="@{/borrow/{id}(id=${book.id})}"
       class="btn btn-success"
       th:classappend="${book.quantity == 0} ? 'disabled' : ''">
        Mượn sách
    </a>

    <p th:if="${book.quantity == 0}" class="text-danger mt-2">
        ❌ Hết sách
    </p>
</div>

<br>
<a th:href="@{/books}" class="btn btn-secondary">Quay lại</a>

</body>
</html>
