<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .container-box {
            margin-top: 40px;
        }

        .card {
            border-radius: 15px;
        }

        .btn-custom {
            border-radius: 25px;
        }
    </style>
</head>
<body>

<div class="container container-box">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="/shop" class="btn btn-outline-primary btn-custom">← Back to Shop</a>
        <h3 class="text-primary fw-bold">🛒 Shopping Cart</h3>
        <div></div>
    </div>

    <!-- SUMMARY -->
    <div class="row mb-4 text-center">
        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Total Items</h6>
                <h4 th:text="${cart.countItemQuantity()}"></h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3">
                <h6>Total Products</h6>
                <h4 th:text="${cart.countProductQuantity()}"></h4>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-3 bg-success text-white">
                <h6>Total Payment</h6>
                <h4 th:text="${#numbers.formatDecimal(cart.countTotalPayment(), 0, 0)} + ' đ'"></h4>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover text-center align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${cart.products}">
                    <td th:text="${product.getKey().name}"></td>
                    <td th:text="${product.getValue()}"></td>
                    <td th:text="${#numbers.formatDecimal(product.getKey().price, 0, 0)} + ' đ'"></td>

                    <td>
                        <a class="btn btn-danger btn-sm"
                           th:href="@{/remove/{id}(id=${product.getKey().id})}"
                           onclick="return confirm('Remove this item?')">
                            ❌ Remove
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <!-- ACTION -->
    <div class="text-end mt-4">

        <!-- CLEAR CART -->
        <a href="/clear-cart"
           class="btn btn-outline-danger btn-custom me-2"
           onclick="return confirm('Clear all items?')">
            🗑 Clear Cart
        </a>

        <!-- CHECKOUT -->
        <form th:action="@{/checkout}" method="post" style="display:inline;">
            <button type="submit"
                    class="btn btn-success btn-lg btn-custom"
                    th:disabled="${cart.countItemQuantity() == 0}">
                💳 Checkout
            </button>
        </form>

    </div>

</div>

<!-- TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="liveToast"
         class="toast text-white bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" th:text="${message}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const message = "[[${message}]]";
    const type = "[[${type}]]";

    if (message && message !== "null") {
        const toastEl = document.getElementById('liveToast');

        if (type === "danger") {
            toastEl.classList.remove("bg-success");
            toastEl.classList.add("bg-danger");
        }

        const toast = new bootstrap.Toast(toastEl);
        toast.show();
    }
</script>

</body>
</html>
