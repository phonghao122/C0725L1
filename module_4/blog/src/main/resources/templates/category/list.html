<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Category List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📂 Category Management</h2>

    <div class="d-flex justify-content-between mb-3">
        <a th:href="@{/blog/home}" class="btn btn-secondary">⬅ Back Blog</a>
        <a th:href="@{/category/add}" class="btn btn-success">➕ Add Category</a>
    </div>

    <div class="card shadow">
        <div class="card-body">

            <table class="table table-bordered table-hover text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th width="200px">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}"></td>
                    <td>
                        <a th:href="@{/category/edit/{id}(id=${c.id})}"
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{/category/delete/{id}(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>
<!-- TOAST MESSAGE -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999">

    <div th:if="${message}"
         id="liveToast"
         class="toast align-items-center text-white border-0"
         th:classappend="' bg-' + (${type} != null ? ${type} : 'success')"
         role="alert">

        <div class="d-flex">
            <div class="toast-body">
                <span th:text="${message}"></span>
            </div>
            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const toastEl = document.getElementById('liveToast');
        if (toastEl) {
            const toast = new bootstrap.Toast(toastEl, {
                delay: 3000
            });
            toast.show();
        }
    });
</script>
</body>
</html>
