<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>
<body>
<div>
    <h1>Thêm Mới</h1>
    Title: <input id="title"><br>
    Content: <textarea id="contentBlog"></textarea><br>
    Category name: <select id="categoryId" class="form-select">
    <option value="0">---------Chọn-------</option>
    <option value="1">Đời Sống</option>
    <option value="2">Âm Nhạc</option>
    <option value="3">Giải Trí</option>
    <option value="4">Ẩm Thực</option>
</select><br>
    <button  id="btn-add">Thêm mới</button>
</div>

<table class="table table-dark table-stripped" border="1" style="border-collapse: collapse;">
    <thead>
    <tr>
        <td>STT</td>
        <td>Title</td>
        <td>Content</td>
        <td>Category Name</td>
    </tr>
    </thead>
    <tbody id="content">

    </tbody>

</table>
<script>
    $(document).ready(function () {
        display();

        $("#btn-add").click(function (){
            let title = $("#title").val();
            let content = $("#contentBlog").val();
            let categoryId = parseInt($("#categoryId").val());
            if (!title || !content || !categoryId) {
                alert("Vui lòng nhập đầy đủ");
                return;
            }
            const blog = {
                title: title,
                content: content,
                category: {
                    id: categoryId
                }
            }
            $.ajax({
                url: "http://localhost:8080/api/v1/blog",
                method: "POST",
                contentType: "application/json",
                data: JSON.stringify(blog),
                success: function (data) {
                    display();
                },
                error: function (data){
                    console.log("-------thất bại--------")
                    console.log(data)
                }
            })
        })

    })



    function display() {
        $.ajax({
            url: "http://localhost:8080/api/v1/blog",
            method: "GET",
            dataType: "json",
            success: function (data) {
                // hiển thị lên bảng;
                let content = "";
                for (let i = 0; i < data.length; i++) {
                    content += `
                     <tr>
                     <td>${i + 1}</td>
                     <td>${data[i].title}</td>
                     <td>${data[i].content}</td>
                     <td>${data[i].category ? data[i].category.name : "Không có"}</td>
                     </tr>
                    `
                }
                $("#content").html(content);
            }
        })
    }
</script>
<h2>Footer</h2>
</body>
</html>
