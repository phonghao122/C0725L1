<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <h3 class="mb-4 text-center">✏️ Edit Blog</h3>

                    <form th:action="@{/blog/edit}" method="post" th:object="${blog}">

                        <input type="hidden" th:field="*{id}">

                        <!-- TITLE -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Title</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}"
                                   placeholder="Enter blog title">
                        </div>

                        <!-- CONTENT -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Content</label>
                            <textarea class="form-control"
                                      th:field="*{content}"
                                      rows="6"
                                      placeholder="Write your content..."></textarea>
                        </div>

                        <!-- CATEGORY (FIX CHUẨN) -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Category</label>
                            <select class="form-select" th:field="*{category.id}">
                                <option value="">-- Select Category --</option>
                                <option th:each="c : ${categories}"
                                        th:value="${c.id}"
                                        th:text="${c.name}">
                                </option>
                            </select>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/blog/home}" class="btn btn-outline-secondary">
                                ⬅ Back
                            </a>

                            <button class="btn btn-warning px-4">
                                💾 Update
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
