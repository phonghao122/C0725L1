<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Blog Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <!-- TITLE -->
                    <h2 class="mb-3 fw-bold" th:text="${blog.title}"></h2>

                    <!-- CATEGORY -->
                    <span class="badge bg-info mb-3"
                          th:text="${blog.category != null ? blog.category.name : 'No Category'}">
                    </span>

                    <hr>

                    <!-- CONTENT -->
                    <p class="fs-5 text-muted"
                       style="white-space: pre-line;"
                       th:text="${blog.content}">
                    </p>

                </div>
            </div>

            <!-- BUTTON -->
            <div class="d-flex justify-content-between mt-3">
                <a th:href="@{/blog/home}" class="btn btn-outline-secondary">
                    ⬅ Back
                </a>

                <div>
                    <a th:href="@{/blog/edit/{id}(id=${blog.id})}" class="btn btn-warning">
                        ✏️ Edit
                    </a>
                    <a th:href="@{/blog/delete/{id}(id=${blog.id})}"
                       class="btn btn-danger"
                       onclick="return confirm('Delete this blog?')">
                        🗑 Delete
                    </a>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
