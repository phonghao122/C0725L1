<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Song Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- TOAST -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999"
         th:if="${message}">
        <div id="toastMessage"
             class="toast text-white border-0"
             th:classappend="${type == 'success'} ? ' bg-success' : ' bg-danger'">
            <div class="d-flex">
                <div class="toast-body">
                    <span th:if="${type == 'success'}">✅</span>
                    <span th:if="${type != 'success'}">❌</span>
                    <span th:text="${message}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        Add Song
                    </h3>

                    <form th:action="@{/song/add}" method="post" th:object="${song}">

                        <input type="hidden" th:value="${id}">

                        <!-- SONG NAME -->
                        <div class="mb-3">
                            <label class="form-label">Song Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Enter song name">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('name')}"
                                   th:errors="*{name}"></small>
                        </div>

                        <!-- ARTIST -->
                        <div class="mb-3">
                            <label class="form-label">Artist</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{artist}"
                                   placeholder="Enter artist name">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('artist')}"
                                   th:errors="*{artist}"></small>
                        </div>

                        <!-- GENRE -->
                        <div class="mb-3">
                            <label class="form-label">Genre (comma separated)</label>
                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{genre}"
                                      placeholder="Pop, Rock, Ballad"></textarea>
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('genre')}"
                                   th:errors="*{genre}"></small>
                        </div>

                        <!-- BUTTON -->
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/song}" class="btn btn-secondary">⬅ Back</a>
                            <button class="btn btn-primary">
                                <span th:text="Save"></span>
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${message}">
    const toast = new bootstrap.Toast(document.getElementById('toastMessage'), {
        delay: 3000
    });
    toast.show();
</script>

</body>
</html>
