<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Song List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <!-- TOAST -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 9999"
         th:if="${message}">
        <div id="toastMessage"
             class="toast text-white border-0"
             th:classappend="${type == 'success'} ? ' bg-success' : ' bg-danger'">
            <div class="d-flex">
                <div class="toast-body">
                    <span th:if="${type == 'success'}">✅</span>
                    <span th:if="${type != 'success'}">❌</span>
                    <span th:text="${message}"></span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- TITLE -->
    <h1 class="text-center mb-4">
        🎵 Song Manager
    </h1>

<!--    &lt;!&ndash; SEARCH &ndash;&gt;-->
<!--    <form th:action="@{/song}" method="get" class="row g-2 mb-3">-->

<!--        <div class="col-md-10">-->
<!--            <input type="text"-->
<!--                   name="keyword"-->
<!--                   class="form-control"-->
<!--                   placeholder="Search by song name or artist..."-->
<!--                   th:value="${keyword}">-->
<!--        </div>-->

<!--        <div class="col-md-2">-->
<!--            <button class="btn btn-primary w-100">🔍 Search</button>-->
<!--        </div>-->

<!--    </form>-->

    <!-- ACTION -->
    <div class="mb-3">
        <a th:href="@{/song/add}" class="btn btn-success">➕ Add Song</a>
    </div>

    <!-- LIST -->
    <div class="row">
        <div class="col-md-4 mb-3" th:each="song : ${songs}">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">

                    <!-- NAME -->
                    <h5 class="card-title fw-bold"
                        th:text="${song.name}"></h5>

                    <!-- ARTIST -->
                    <p class="text-muted mb-1">
                        🎤 <span th:text="${song.artist}"></span>
                    </p>

                    <!-- GENRE -->
                    <p class="mb-2">
                        <span class="badge bg-info"
                              th:text="${song.genre}"></span>
                    </p>

                    <!-- BUTTON -->
                    <div class="mt-auto">
                        <a th:href="@{/song/edit/{id}(id=${song.id})}"
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{/song/delete/{id}(id=${song.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this song?')">Delete</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- EMPTY -->
    <div th:if="${#lists.isEmpty(songs)}" class="text-center text-muted mt-4">
        No songs found 😢
    </div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${message}">
    const toast = new bootstrap.Toast(document.getElementById('toastMessage'), {
        delay: 3000
    });
    toast.show();
</script>

</body>
</html>
