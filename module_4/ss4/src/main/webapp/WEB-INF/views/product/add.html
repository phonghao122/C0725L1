<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
        }

        .form-box{
            width:500px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="form-box">

    <h2 class="text-center mb-4">Add Product</h2>

    <form action="/product/add" method="post" th:object="${product}">

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price (VND)</label>
            <input type="number" class="form-control" th:field="*{price}">
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" th:field="*{quantity}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
        </div>

        <div class="text-center">

            <button type="submit" class="btn btn-success">
                Add Product
            </button>

            <button type="reset" class="btn btn-secondary">
                Reset
            </button>

        </div>

    </form>

</div>
<script>
    const priceInput = document.getElementById("priceInput");

    priceInput.addEventListener("input", function () {

        let value = this.value.replace(/,/g,'');

        if(!isNaN(value)){
            this.value = Number(value).toLocaleString('vi-VN');
        }

    });
</script>
</body>
</html>
