<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
        }

        .form-box{
            width:500px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="form-box">

    <h2 class="text-center mb-4">Edit Product</h2>

    <form action="/product/edit" method="post" th:object="${product}">

        <div class="mb-3">
            <label class="form-label">ID</label>
            <input type="number" class="form-control" th:field="*{id}" th:value="${product.id}" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" class="form-control" th:field="*{name}" th:value="${product.name}">
        </div>

        <div class="mb-3">
            <label class="form-label">Price (VND)</label>
            <input type="number" class="form-control" th:field="*{price}">
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" th:field="*{quantity}" th:value="${product.quantity}">
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" th:field="*{description}" th:text="${product.description}" rows="3"></textarea>
        </div>

        <div class="text-center">

            <button type="submit" class="btn btn-primary">
                Update Product
            </button>

            <a href="/product/list" class="btn btn-secondary">
                Cancel
            </a>

        </div>

    </form>

</div>
</body>
</html>
