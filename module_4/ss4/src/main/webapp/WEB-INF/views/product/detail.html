<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Product Detail</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f6fa;
        }

        .product-card{
            width:500px;
            margin:60px auto;
            padding:25px;
            background:white;
            border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="product-card">

    <h2 class="text-center mb-4">Product Detail</h2>

    <table class="table table-bordered">

        <tr>
            <th>ID</th>
            <td th:text="${product.id}"></td>
        </tr>

        <tr>
            <th>Name</th>
            <td th:text="${product.name}"></td>
        </tr>

        <tr>
            <th>Price</th>
            <td th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' ₫'"></td>
        </tr>

        <tr>
            <th>Quantity</th>
            <td th:text="${product.quantity}"></td>
        </tr>

        <tr>
            <th>Description</th>
            <td th:text="${product.description}"></td>
        </tr>

    </table>

    <div class="text-center">
        <a th:href="@{/product/edit/__${product.id}__}" class="btn btn-primary">Edit</a>
        <a th:href="@{/product/delete/__${product.id}__}" class="btn btn-danger">Delete</a>
    </div>

</div>

</body>
</html>
