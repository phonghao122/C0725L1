<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4">📝 Register Account</h3>

                    <form th:action="@{/register/add}" method="post" th:object="${user}">

                        <!-- NAME -->
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}"
                                   placeholder="Enter your name">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('name')}"
                                   th:errors="*{name}"></small>
                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="Enter email">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('email')}"
                                   th:errors="*{email}"></small>
                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Enter password">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('password')}"
                                   th:errors="*{password}"></small>
                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password"
                                   class="form-control"
                                   th:field="*{confirmPassword}"
                                   placeholder="Confirm password">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('confirmPassword')}"
                                   th:errors="*{confirmPassword}"></small>
                        </div>

                        <!-- PHONE -->
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}"
                                   placeholder="Enter phone number">
                            <small class="text-danger"
                                   th:if="${#fields.hasErrors('phone')}"
                                   th:errors="*{phone}"></small>
                        </div>

                        <!-- SUBMIT -->
                        <div class="d-grid">
                            <button class="btn btn-primary">Register</button>
                        </div>

                        <!-- LOGIN -->
                        <div class="text-center mt-3">
                            <span>Already have an account?</span>
                            <a th:href="@{/login}">Login</a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>
<!-- TOAST -->
<div class="position-fixed top-0 end-0 p-3" style="z-index: 9999"
     th:if="${message}">

    <div id="toastMessage"
         class="toast align-items-center text-white border-0"
         th:classappend="${type == 'success'} ? ' bg-success' : ' bg-danger'"
         role="alert">

        <div class="d-flex">
            <div class="toast-body" th:text="${message}"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast"></button>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${message}">
    const toastEl = document.getElementById('toastMessage');
    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
</script>
</body>
</html>
